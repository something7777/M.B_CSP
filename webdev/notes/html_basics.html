is written on the doccument-->

        <title>HTML Basics Notes</title>
        <meta charset="UTF -8"><!--meta can give a lot of info this time we are saying
         we are using the english alphabet -->
    </head>
    <body><!--content the user will see-->

    <h6><b>smallest header</b></h6>

        webpages. think of these just like paragraphs
        on your english papers in class</p>
    <br>
    <br>
    <p>this is the second paragraph that has 
        more information</p>
    <body>
</html>
