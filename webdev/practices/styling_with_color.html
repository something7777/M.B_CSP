<!DOCTYPE html>
<html lang="en">
    <head>
        <title>HTML Basics Notes</title>
        <meta charset="UTF -8">
        <style>
            .even{background-color:rgb(246, 255, 204); 
                border: 5px solid rgb(209, 154, 223);
                height: 300px; width: 300px;
            }
            h1{text-align: center;
            font-style: italic;
             color: rgb(252, 180, 248);}
            .odd{background-color:rgb(212, 122, 18); 
                border: 5px solid rgb(104, 21, 21);
                height: 300px; width: 300px;
            }
            h2{text-align: center;
            font-style: italic;
             color: rgb(131, 34, 34);}
            .ya{background-color:rgb(247, 236, 85); 
                border: 5px solid rgb(46, 21, 104);
                height: 300px; width: 300px;
            }
            h3{text-align: center;
            font-style: italic;
             color: rgb(151, 0, 0);}
        </style>
    </head>
    <body>
        <div class=even>
        <h1> complimentary</h1>
        </div>
        <br>
        <div class=odd>
        <h2> Analogous</h2>
        </div>
        <br>
        <div class=ya>
        <h3> Triadic</h3>
        </div>
    <body>
</html>
